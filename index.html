<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-A-P - Catálogo de Equipos</title>
    <style>
        /* --- 1. ENCABEZADO MEJORADO Y RESPONSIVO --- */
        header {
            background-color: #000;
            color: #ffcc00; /* Amarillo industrial */
            padding: 20px;
            border-bottom: 5px solid #ffcc00;
            display: flex;
            flex-direction: column; /* Apilado en móvil */
            align-items: center;
            text-align: center;
            font-family: 'Arial Black', sans-serif;
            width: 100%;
            box-sizing: border-box;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        .header-tagline {
            color: #fff;
            font-size: 1rem;
            margin-top: 5px;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
        }

        /* Ajuste para Computadora */
        @media (min-width: 768px) {
            header {
                flex-direction: row; /* Horizontal en PC */
                justify-content: space-between;
                padding: 20px 60px;
                text-align: left;
            }
            .header-tagline {
                margin-top: 0;
                text-align: right;
            }
        }

        /* --- 2. GRID Y CARDS --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            cursor: pointer; /* Indica que se puede hacer clic */
            display: block;
        }

        /* --- 3. EFECTO DE RESALTADO (LIGHTBOX) --- */
        .overlay-resaltado {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: none; /* Oculto por defecto */
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: zoom-out;
            padding: 20px;
        }

        .overlay-resaltado img {
            max-width: 95%;
            max-height: 85%;
            border: 4px solid #ffcc00;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .no-scroll { overflow: hidden; }

        /* Estilo Botón WhatsApp */
        .btn-ws {
            display: block;
            background: #25d366;
            color: white;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-weight: bold;
            margin: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>G-A-P</h1>
        </div>
        <div class="header-tagline">
            <strong>Renta de Equipo Profesional</strong><br>
            Servicio en todo Monterrey
        </div>
    </header>

    <div class="container">
        <div class="card" data-nombre="Rompedora de Concreto">
            <img src="URL_DE_TU_FOTO_1.jpg" alt="Equipo GAP" class="foto-clic">
            <div style="padding: 10px;">
                <h2 style="margin: 10px 0;">Rompedora de Concreto</h2>
                <a href="#" class="btn-ws">Solicitar Informes</a>
            </div>
        </div>

        </div>

    <div id="overlay" class="overlay-resaltado">
        <img id="img-ampliada" src="" alt="Vista ampliada">
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // --- LÓGICA PARA RESALTAR FOTOS ---
            const overlay = document.getElementById('overlay');
            const imgAmpliada = document.getElementById('img-ampliada');
            const fotos = document.querySelectorAll('.foto-clic');

            fotos.forEach(foto => {
                foto.addEventListener('click', () => {
                    imgAmpliada.src = foto.src; // Pasa la imagen a la vista grande
                    overlay.style.display = 'flex'; // Muestra el fondo negro
                    document.body.classList.add('no-scroll'); // Evita que la página se mueva atrás
                });
            });

            // Cerrar el resaltado al hacer clic en cualquier parte del fondo negro
            overlay.addEventListener('click', () => {
                overlay.style.display = 'none';
                document.body.classList.remove('no-scroll');
            });


            // --- LÓGICA PARA WHATSAPP (Ajustada) ---
            const botones = document.querySelectorAll('.btn-ws');
            botones.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const nombreEquipo = btn.closest('.card').getAttribute('data-nombre');
                    const telefono = "528119988053";
                    const texto = encodeURIComponent(`Hola G-A-P, solicito informes sobre: ${nombreEquipo}`);
                    window.open(`https://wa.me/${telefono}?text=${texto}`, '_blank');
                });
            });
        });
    </script>

</body>
</html>
